services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    volumes:
      - ${POSTGRES_DATA_DIR:-./.docker/postgres}:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - hive-internal

  backend:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: Dockerfile.api
      target: runtime
    environment:
      BIND_ADDR: 0.0.0.0:3000
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}
      RUST_LOG: ${RUST_LOG:-hive_api=info,tower_http=info}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      - hive-internal
      - hive-proxy

  frontend:
    profiles: ["prod"]
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: runtime
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    depends_on:
      - backend
    expose:
      - "80"
    networks:
      - hive-proxy

  backend-dev:
    profiles: ["dev"]
    image: rust:1.95-bookworm
    working_dir: /app
    command: cargo run -p hive_api --bin hive-api
    environment:
      BIND_ADDR: 0.0.0.0:3000
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-postgres}
      RUST_LOG: ${RUST_LOG:-hive_api=debug,tower_http=debug}
    volumes:
      - .:/app
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - cargo-target:/app/target
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"
    networks:
      - hive-internal
      - hive-dev

  frontend-dev:
    profiles: ["dev"]
    image: node:25-bookworm
    working_dir: /app/frontend
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_PROXY_TARGET: http://backend-dev:3000
    volumes:
      - .:/app
      - frontend-node-modules:/app/frontend/node_modules
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      - backend-dev
    networks:
      - hive-dev
  
  nginx:
    profiles: ["prod"]
    image: jonasal/nginx-certbot:6.2.0-nginx1.29.8
    restart: unless-stopped
    environment:
      CERTBOT_EMAIL: ${CERTBOT_EMAIL:-you@example.com}
      STAGING: ${STAGING:-1}
      HIVE_DOMAIN: ${HIVE_DOMAIN:-localhost}
      CERTBOT_CERT_NAME: ${CERTBOT_CERT_NAME:-hive}
      DHPARAM_SIZE: ${DHPARAM_SIZE:-2048}
      USE_ECDSA: ${USE_ECDSA:-1}
      RENEWAL_INTERVAL: ${RENEWAL_INTERVAL:-8d}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${CERTBOT_DATA_DIR:-./nginx_secrets}:/etc/letsencrypt
      - ./nginx/templates:/etc/nginx/templates:ro
    depends_on:
      - frontend
      - backend
    networks:
      - hive-proxy

volumes:
  cargo-registry:
  cargo-git:
  cargo-target:
  frontend-node-modules:

networks:
  hive-internal:
    internal: true
  hive-proxy:
  hive-dev:
